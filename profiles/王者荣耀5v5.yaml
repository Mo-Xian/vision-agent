action_descriptions:
  attack: 普通攻击，用于对敌方英雄、小兵、野怪造成持续伤害
  skill_1: 释放技能1（主技能），CD较短，用于主要输出或控制
  skill_2: 释放技能2，通常为位移技能或辅助技能
  skill_3: 释放大招，强力技能，CD较长，4级解锁，适合团战开团或收割
  summoner_skill: 释放召唤师技能（闪现/惩戒/治疗等）
  move_forward: 向前移动/靠近敌人，适用于追击或参团
  retreat: 撤退/后退，当血量低或敌方多人时撤离
  move_to_lane: 回到线上或去其他路线支援/游走
  last_hit: 补刀，等小兵残血时攻击获取额外金币
  jungle: 打野，攻击野区中立怪物获取经验和金币
  push_tower: 推塔，攻击敌方防御塔扩大优势
  defend_tower: 守塔，在己方塔下防御敌方进攻
  recall: 回城，长按回城键返回泉水补血和购买装备
  buy_item: 购买装备，在泉水或通过快捷购买装备
  check_map: 查看小地图，关注敌方动向、队友位置和资源刷新
  signal: 发信号，通知队友进攻/撤退/集合
  idle: 等待/观察，不确定时原地观察局势
