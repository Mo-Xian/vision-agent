name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 等 tag 时触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: python build_exe.py

      - name: Copy config files
        run: |
          mkdir -p dist/VisionAgent/profiles
          cp profiles/*.yaml dist/VisionAgent/profiles/
          cp config.yaml dist/VisionAgent/
        shell: bash

      - name: Create ZIP
        run: |
          cd dist
          7z a -tzip ../VisionAgent-${{ github.ref_name }}-windows.zip VisionAgent/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionAgent-windows
          path: VisionAgent-${{ github.ref_name }}-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: VisionAgent-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
