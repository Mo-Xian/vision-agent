name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 等 tag 时触发

permissions:
  contents: write  # 创建 Release 需要写权限

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: python build_exe.py

      - name: Copy config files
        run: |
          mkdir -p dist/VisionAgent/profiles
          cp profiles/*.yaml dist/VisionAgent/profiles/
          cp config.yaml dist/VisionAgent/
        shell: bash

      - name: Create ZIP
        run: |
          cd dist
          7z a -tzip ../VisionAgent-${{ github.ref_name }}-windows.zip VisionAgent/
        shell: bash

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $content = Get-Content CHANGELOG.md -Raw
          # 匹配 ## [vX.Y.Z] 到下一个 ## [ 或文件结尾
          if ($content -match "(?ms)## \[$tag\][^\n]*\n(.*?)(?=\n## \[|$)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "Release $tag"
          }
          # 写入文件避免多行转义问题
          $notes | Out-File -FilePath release_notes.md -Encoding utf8
          Write-Host "Release notes extracted for $tag"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionAgent-windows
          path: VisionAgent-${{ github.ref_name }}-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: VisionAgent-${{ github.ref_name }}-windows.zip
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
