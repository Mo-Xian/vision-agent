name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 等 tag 时触发

permissions:
  contents: write  # 创建 Release 需要写权限

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build VisionAgent EXE
        run: python build_exe.py

      - name: Build RemoteCaptureClient EXE
        run: python build_server.py --onefile

      - name: Build RelayServer EXE
        run: python build_relay.py

      - name: Copy config files
        run: |
          mkdir -p dist/VisionAgent/profiles
          cp profiles/*.yaml dist/VisionAgent/profiles/
          cp config.yaml dist/VisionAgent/
        shell: bash

      - name: Create VisionAgent ZIP
        run: |
          cd dist
          7z a -tzip ../VisionAgent-${{ github.ref_name }}-windows.zip VisionAgent/
        shell: bash

      - name: Copy RemoteCaptureClient EXE
        run: cp dist/RemoteCaptureClient.exe RemoteCaptureClient-${{ github.ref_name }}-windows.exe
        shell: bash

      - name: Copy RelayServer EXE
        run: cp dist/RelayServer.exe RelayServer-${{ github.ref_name }}-windows.exe
        shell: bash

      - name: Extract release notes from CHANGELOG
        run: |
          TAG="${{ github.ref_name }}"
          # 提取 ## [vX.Y.Z] 段落到下一个 ## [ 之前
          awk -v tag="$TAG" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if (index($0, "[" tag "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          # 如果没提取到内容，用默认文本
          if [ ! -s release_notes.md ]; then
            echo "Release $TAG" > release_notes.md
          fi
          echo "--- Release notes ---"
          cat release_notes.md
        shell: bash

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VisionAgent-windows
          path: |
            VisionAgent-${{ github.ref_name }}-windows.zip
            RemoteCaptureClient-${{ github.ref_name }}-windows.exe
            RelayServer-${{ github.ref_name }}-windows.exe

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle assembleRelease assembleDebug

      - name: Copy APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk VisionAgentClient-${{ github.ref_name }}-debug.apk
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk VisionAgentClient-${{ github.ref_name }}-release.apk
          fi
        shell: bash

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VisionAgent-android
          path: VisionAgentClient-*.apk

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VisionAgent-${{ github.ref_name }}-windows.zip
            RemoteCaptureClient-${{ github.ref_name }}-windows.exe
            RelayServer-${{ github.ref_name }}-windows.exe
            VisionAgentClient-${{ github.ref_name }}-debug.apk
            VisionAgentClient-${{ github.ref_name }}-release.apk
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
          fail_on_unmatched_files: false
