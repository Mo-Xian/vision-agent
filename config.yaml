# Vision Agent Configuration — 端到端学习框架

# LLM 配置
llm:
  provider: "minimax"
  model: "MiniMax-M2.7"
  api_key_env: "MINIMAX_API_KEY"
  base_url: ""

# 学习管线配置
learning:
  sample_count: 300        # 标注帧数
  epochs: 100              # 训练轮数
  rl_steps: 2000           # RL 步数 (0=跳过)
  batch_size: 5            # LLM 批量标注大小
  send_image: true         # 发送截图给 LLM
  output_dir: "runs/workshop"
